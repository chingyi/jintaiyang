<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金太陽燈飾 後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --teal:#3BBFBF;--teal-dark:#2A9A9A;--teal-deeper:#1E7A7A;
  --teal-pale:#DFF4F4;--teal-bg:#F0FAFA;--white:#FFFFFF;
  --text:#1A3A3A;--muted:#4A8080;--border:#D0E8E8;
  --danger:#E24B4A;--danger-bg:#FCEBEB;
  --success:#0F6E56;--success-bg:#E1F5EE;
  --warn:#BA7517;--warn-bg:#FAEEDA;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--teal-bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--teal);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--white);border-radius:16px;padding:2.5rem 2rem;width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.login-sun{font-size:2.5rem;margin-bottom:0.5rem}
.login-title{font-weight:900;font-size:1.2rem;color:var(--teal-deeper);margin-bottom:0.3rem}
.login-sub{font-size:0.8rem;color:var(--muted);margin-bottom:1.5rem}
.login-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:1rem;font-family:inherit;color:var(--text);outline:none;text-align:center;letter-spacing:0.2em;margin-bottom:10px;transition:border-color 0.2s}
.login-input:focus{border-color:var(--teal)}
.login-input.error{border-color:var(--danger);animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.login-btn{width:100%;padding:11px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background 0.2s}
.login-btn:hover{background:var(--teal-dark)}
.login-err{font-size:0.8rem;color:var(--danger);margin-top:8px;display:none}

/* TOPBAR */
.topbar{background:var(--teal);padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
.topbar-brand{display:flex;align-items:center;gap:10px;color:#fff;font-weight:900;font-size:1rem;letter-spacing:0.05em}
.topbar-sun{width:30px;height:30px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.95rem}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-badge{font-size:0.68rem;background:rgba(255,255,255,0.2);color:#fff;padding:3px 10px;border-radius:20px}
.topbar-site{font-size:0.78rem;color:rgba(255,255,255,0.85);text-decoration:none;padding:5px 12px;border:1px solid rgba(255,255,255,0.4);border-radius:20px;transition:background 0.2s}
.topbar-site:hover{background:rgba(255,255,255,0.15)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:176px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:1rem 0}
.sidebar-label{font-size:0.65rem;font-weight:700;letter-spacing:0.15em;color:var(--muted);padding:0 1rem;margin:1rem 0 0.4rem}
.sidebar-label:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:8px;padding:0.6rem 1rem;font-size:0.83rem;cursor:pointer;color:var(--muted);transition:all 0.15s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{background:var(--teal-bg);color:var(--teal-dark)}
.nav-item.active{background:var(--teal-pale);color:var(--teal-deeper);border-left-color:var(--teal);font-weight:700}
.content{flex:1;padding:1.8rem;overflow-y:auto;max-width:860px}

/* PANELS */
.panel{display:none}.panel.active{display:block}
.page-title{font-weight:900;font-size:1.35rem;color:var(--teal-deeper);margin-bottom:0.2rem}
.page-sub{font-size:0.82rem;color:var(--muted);margin-bottom:1.5rem;font-weight:300;line-height:1.6}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1rem}
.card-title{font-weight:700;font-size:0.92rem;color:var(--teal-deeper);display:flex;align-items:center;gap:8px;margin-bottom:10px}

/* PHOTOS */
.photos-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.photo-thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:2px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.65);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-del:hover{background:var(--danger)}
.url-row{display:flex;gap:8px;margin-top:4px}
.url-input{flex:1;font-size:0.82rem;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;color:var(--text);background:var(--white);outline:none;font-family:inherit;transition:border-color 0.2s}
.url-input:focus{border-color:var(--teal)}
.url-input.error{border-color:var(--danger)}
.badge-count{font-size:0.7rem;background:var(--teal-pale);color:var(--teal-deeper);padding:2px 8px;border-radius:20px;font-weight:700}

/* BUTTONS */
.btn{font-size:0.82rem;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;transition:all 0.2s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal-deeper)}.btn-outline:hover{background:var(--teal-pale)}
.btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger)}.btn-danger:hover{background:var(--danger-bg)}
.btn-gray{background:transparent;border:1.5px solid var(--border);color:var(--muted)}.btn-gray:hover{background:var(--teal-bg)}
.btn-lg{padding:11px 24px;font-size:0.9rem;width:100%;justify-content:center;border-radius:10px;margin-top:6px}
.btn:disabled{opacity:0.5;cursor:not-allowed}

/* REVIEWS */
.review-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin-bottom:8px}
.review-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap}
.review-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.reviewer{font-weight:700;font-size:0.88rem;color:var(--teal-deeper)}
.stars{color:#EF9F27;font-size:0.88rem;letter-spacing:1px}
.rdate{font-size:0.72rem;color:var(--muted)}
.review-actions{display:flex;gap:6px;flex-shrink:0}
.review-body{font-size:0.83rem;color:var(--muted);line-height:1.7}
.badge{font-size:0.67rem;padding:2px 7px;border-radius:20px;font-weight:700}
.badge-on{background:var(--success-bg);color:var(--success)}
.badge-off{background:#F1EFE8;color:#5F5E5A}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem}

/* ADD REVIEW */
.form-section{background:var(--teal-bg);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.4rem;margin-top:1rem}
.form-title{font-weight:700;font-size:0.88rem;color:var(--teal-deeper);margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.form-label{font-size:0.72rem;color:var(--muted);font-weight:700;letter-spacing:0.04em}
.form-input{font-size:0.83rem;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--text);outline:none;font-family:inherit;transition:border-color 0.2s}
.form-input:focus{border-color:var(--teal)}
textarea.form-input{min-height:74px;resize:vertical}
.star-picker{display:flex;gap:4px}
.star-btn{font-size:1.4rem;cursor:pointer;background:none;border:none;padding:0;color:#D0E0E0;transition:color 0.15s;line-height:1}
.star-btn.on{color:#EF9F27}
.form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}

/* PUBLISH BAR */
.publish-bar{position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--border);padding:0.9rem 1.8rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;z-index:50}
.publish-status{font-size:0.83rem;color:var(--muted)}
.publish-status.changed{color:var(--warn);font-weight:700}
.publish-status.publishing{color:var(--teal);font-weight:700}
.publish-status.done{color:var(--success);font-weight:700}
.publish-status.err{color:var(--danger);font-weight:700}
.publish-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:0.9rem;font-weight:900;cursor:pointer;font-family:inherit;transition:background 0.2s;white-space:nowrap}
.publish-btn:hover:not(:disabled){background:var(--teal-dark)}
.publish-btn:disabled{opacity:0.5;cursor:not-allowed}

/* PROGRESS */
.progress-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;display:none}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:var(--teal);width:0%;transition:width 0.4s}

@media(max-width:580px){
  .sidebar{display:none}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-sun">☀️</div>
    <div class="login-title">金太陽燈飾 後台</div>
    <div class="login-sub">請輸入管理密碼</div>
    <input id="pw-input" class="login-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="login-err">密碼錯誤，請再試一次</div>
  </div>
</div>

<!-- MAIN -->
<div id="main-app" style="display:none">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-sun">☀️</div>
      金太陽燈飾照明
    </div>
    <div class="topbar-right">
      <span class="topbar-badge">後台管理</span>
      <a class="topbar-site" href="https://jintaiyang.tw" target="_blank">→ 看網站</a>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-label">管理</div>
      <div class="nav-item active" onclick="switchPanel('photos',this)">🖼 照片管理</div>
      <div class="nav-item" onclick="switchPanel('reviews',this)">💬 客戶評論</div>
    </nav>

    <div style="flex:1;display:flex;flex-direction:column">
      <main class="content">

        <!-- PHOTOS -->
        <div class="panel active" id="panel-photos">
          <p class="page-title">🖼 照片管理</p>
          <p class="page-sub">貼上圖片網址即可更新。建議用 <strong>Imgur</strong> 上傳圖片後複製連結，或從 Google 相簿取得直連網址。每類最多 6 張。</p>
          <div id="photo-cats"></div>
        </div>

        <!-- REVIEWS -->
        <div class="panel" id="panel-reviews">
          <p class="page-title">💬 客戶評論管理</p>
          <p class="page-sub">新增或隱藏客戶評論。「顯示中」的評論才會出現在網站上。</p>
          <div id="reviews-container"></div>
          <div class="form-section">
            <p class="form-title">＋ 新增評論</p>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">客戶姓名</label>
                <input id="r-name" class="form-input" type="text" placeholder="例：王先生">
              </div>
              <div class="form-group">
                <label class="form-label">日期</label>
                <input id="r-date" class="form-input" type="date">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">評論內容</label>
              <textarea id="r-text" class="form-input" placeholder="輸入客戶說的話..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">星級評分</label>
              <div class="star-picker" id="star-picker">
                <button class="star-btn on" onclick="setStar(1)">★</button>
                <button class="star-btn on" onclick="setStar(2)">★</button>
                <button class="star-btn on" onclick="setStar(3)">★</button>
                <button class="star-btn on" onclick="setStar(4)">★</button>
                <button class="star-btn on" onclick="setStar(5)">★</button>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-teal" onclick="addReview()">新增評論</button>
            </div>
          </div>
        </div>

      </main>

      <!-- PUBLISH BAR -->
      <div class="publish-bar">
        <div>
          <div class="publish-status" id="pub-status">尚無變更</div>
          <div class="progress-wrap" id="progress-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <button class="publish-btn" id="pub-btn" onclick="publishToGitHub()" disabled>發布到網站</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const PASSWORD   = 'jty2026';
const GH_TOKEN   = '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';
const GH_OWNER   = 'chingyi';
const GH_REPO    = 'jintaiyang';
const GH_BRANCH  = 'main';
const GH_PATH    = 'index.html';
// ────────────────────────────────────────────────────────

const CATS = [
  {key:'fan',     name:'吊扇',                    sub:'現代款 · 傳統款',              album:'https://photos.app.goo.gl/w7cfLSWabaX6TPELA'},
  {key:'pendant', name:'吊燈',                    sub:'餐桌 · 玄關 · 客廳',           album:'https://photos.app.goo.gl/NmP2YHbKQQAK8Esn8'},
  {key:'wall',    name:'壁燈',                    sub:'走廊 · 臥室 · 氛圍',           album:'https://photos.app.goo.gl/k7nQegBJxU3mR2WC7'},
  {key:'ceiling', name:'吸頂燈',                  sub:'臥室 · 廁所 · 晶片型 · 燈泡型', album:'https://photos.app.goo.gl/CEcHFioE1XBTdW4S7'},
  {key:'led',     name:'LED 崁燈 · 投射燈 · 軌道燈', sub:'節能 · 住宅 · 商辦',       album:'https://photos.app.goo.gl/hpQhJ2f6Hhk7nVUm8'},
  {key:'parts',   name:'電燈泡 · 配件 · 零件',    sub:'各式燈泡 · 燈座 · 配線配件',   album:''},
];

let siteData = {photos:{}, reviews:[]};
let hasChanges = false;
let newStar = 5;

// ── LOGIN ────────────────────────────────────────────────
function doLogin(){
  const val = document.getElementById('pw-input').value;
  if(val === PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    loadLocalData();
    renderAll();
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    document.getElementById('login-err').style.display='block';
    setTimeout(()=>inp.classList.remove('error'),400);
    inp.value='';
  }
}

// ── DATA ─────────────────────────────────────────────────
function loadLocalData(){
  try{
    const s = localStorage.getItem('jty_live_v1');
    if(s) siteData = JSON.parse(s);
  }catch(e){}
  CATS.forEach(c=>{ if(!siteData.photos[c.key]) siteData.photos[c.key]=[]; });
  if(!siteData.reviews) siteData.reviews=[];
}

function saveLocal(){
  localStorage.setItem('jty_live_v1', JSON.stringify(siteData));
  markChanged();
}

function markChanged(){
  hasChanges = true;
  setStatus('changed','有未發布的變更 — 記得按「發布到網站」');
  document.getElementById('pub-btn').disabled = false;
}

function setStatus(type, msg){
  const el = document.getElementById('pub-status');
  el.className = 'publish-status ' + type;
  el.textContent = msg;
}

// ── PANELS ───────────────────────────────────────────────
function switchPanel(name, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
}

function renderAll(){ renderPhotos(); renderReviews(); }

// ── PHOTOS ───────────────────────────────────────────────
function renderPhotos(){
  const el = document.getElementById('photo-cats');
  el.innerHTML = CATS.map(c=>{
    const photos = siteData.photos[c.key]||[];
    const thumbs = photos.map((url,i)=>`
      <div class="photo-thumb">
        <img src="${url}" onerror="this.style.opacity=0.25" alt="">
        <button class="photo-del" onclick="delPhoto('${c.key}',${i})">×</button>
      </div>`).join('');
    const addArea = photos.length < 6
      ? `<div class="url-row">
           <input class="url-input" id="url-${c.key}" placeholder="貼上圖片網址 https://..." type="url"
             onkeydown="if(event.key==='Enter')addPhoto('${c.key}')">
           <button class="btn btn-teal" onclick="addPhoto('${c.key}')">加入</button>
         </div>`
      : `<p style="font-size:0.75rem;color:var(--muted);margin-top:4px">已達 6 張，請先刪除舊照片</p>`;
    const albumLink = c.album
      ? `<a href="${c.album}" target="_blank" style="margin-left:auto;font-size:0.7rem;color:var(--teal-dark);text-decoration:none;font-weight:400">📷 Google 相簿</a>`
      : '';
    return `<div class="card">
      <p class="card-title">${c.name} <span class="badge-count">${photos.length}/6</span>${albumLink}</p>
      <p style="font-size:0.73rem;color:var(--muted);margin-bottom:10px">${c.sub}</p>
      <div class="photos-grid">${thumbs||'<span style="font-size:0.78rem;color:var(--muted);padding:4px 0">尚無照片</span>'}</div>
      ${addArea}
    </div>`;
  }).join('');
}

function addPhoto(key){
  const inp = document.getElementById('url-'+key);
  const url = inp.value.trim();
  if(!url.startsWith('http')){ inp.classList.add('error'); setTimeout(()=>inp.classList.remove('error'),1500); return; }
  siteData.photos[key].push(url);
  inp.value='';
  renderPhotos();
  saveLocal();
}

function delPhoto(key,i){
  if(!confirm('確定刪除這張照片？')) return;
  siteData.photos[key].splice(i,1);
  renderPhotos();
  saveLocal();
}

// ── REVIEWS ──────────────────────────────────────────────
function renderReviews(){
  const el = document.getElementById('reviews-container');
  if(!siteData.reviews.length){
    el.innerHTML=`<div class="empty">💬 尚無評論，請在下方新增第一則</div>`;
    return;
  }
  el.innerHTML = siteData.reviews.map((r,i)=>`
    <div class="review-item">
      <div class="review-top">
        <div class="review-meta">
          <span class="reviewer">${r.name}</span>
          <span class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
          <span class="rdate">${r.date}</span>
          <span class="badge ${r.show?'badge-on':'badge-off'}">${r.show?'顯示中':'已隱藏'}</span>
        </div>
        <div class="review-actions">
          <button class="btn btn-outline" style="padding:4px 9px;font-size:0.73rem" onclick="toggleReview(${i})">${r.show?'隱藏':'顯示'}</button>
          <button class="btn btn-danger" style="padding:4px 9px;font-size:0.73rem" onclick="delReview(${i})">刪除</button>
        </div>
      </div>
      <p class="review-body">"${r.text}"</p>
    </div>`).join('');
}

function setStar(n){
  newStar=n;
  document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('on',i<n));
}

function addReview(){
  const name=document.getElementById('r-name').value.trim();
  const date=document.getElementById('r-date').value;
  const text=document.getElementById('r-text').value.trim();
  if(!name||!text){ alert('請填寫姓名和評論內容'); return; }
  siteData.reviews.unshift({name,date,text,stars:newStar,show:true});
  document.getElementById('r-name').value='';
  document.getElementById('r-text').value='';
  setStar(5);
  renderReviews();
  saveLocal();
}

function toggleReview(i){ siteData.reviews[i].show=!siteData.reviews[i].show; renderReviews(); saveLocal(); }
function delReview(i){ if(!confirm('確定刪除？')) return; siteData.reviews.splice(i,1); renderReviews(); saveLocal(); }

// ── BUILD HTML ───────────────────────────────────────────
function buildHTML(){
  const photos = siteData.photos;
  const reviews = siteData.reviews.filter(r=>r.show);

  const makePhotos = (key) => {
    const arr = (photos[key]||[]).slice(0,4);
    return arr.length
      ? arr.map((url,i)=>`<div class="photo-item" onclick="openLB('${key}',${i})"><img src="${url}" alt="" loading="lazy"></div>`).join('')
      : '<div class="cat-photos-empty"><span>照片即將上線</span></div>';
  };

// ── PUBLISH ──────────────────────────────────────────────
async function publishToGitHub(){
  const btn = document.getElementById('pub-btn');
  const pw = document.getElementById('progress-wrap');
  const pb = document.getElementById('progress-bar');
  btn.disabled = true;
  pw.classList.add('show');

  try {
    setStatus('publishing','正在取得目前版本...');
    pb.style.width='20%';

    // 1. get current SHA
    const getRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`, {
      headers:{ Authorization:`token ${GH_TOKEN}`, Accept:'application/vnd.github.v3+json' }
    });
    if(!getRes.ok) throw new Error('無法取得檔案 SHA，請確認 Token 是否正確');
    const getJson = await getRes.json();
    const sha = getJson.sha;
    pb.style.width='50%';

    setStatus('publishing','正在上傳新版本...');

    // 2. build & encode
    const html = buildHTML();
    const encoded = btoa(unescape(encodeURIComponent(html)));
    pb.style.width='70%';

    // 3. push
    const putRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`, {
      method:'PUT',
      headers:{ Authorization:`token ${GH_TOKEN}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify({
        message:`後台更新 ${new Date().toLocaleString('zh-TW')}`,
        content: encoded,
        sha: sha,
        branch: GH_BRANCH
      })
    });
    if(!putRes.ok){
      const err = await putRes.json();
      throw new Error(err.message||'上傳失敗');
    }
    pb.style.width='100%';
    hasChanges = false;
    setStatus('done','✓ 已發布！網站約 1-2 分鐘後更新');
    setTimeout(()=>{ pb.style.width='0%'; pw.classList.remove('show'); setStatus('','尚無變更'); },5000);

  } catch(e) {
    setStatus('err','❌ 發布失敗：' + e.message);
    pb.style.width='0%';
    pw.classList.remove('show');
    btn.disabled = false;
  }
}
